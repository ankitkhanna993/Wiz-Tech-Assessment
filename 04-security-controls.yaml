  #     ConfigSnapshotDeliveryProperties:
  #       DeliveryFrequency: TwentyFour_Hours

  # -------------------------------------------------------
  # AWS Config Rules - Preventative Controls (REQUIRED)
  # -------------------------------------------------------

  # Rule: Detect publicly accessible S3 buckets
  S3PublicReadRule:
    Type: AWS::Config::ConfigRule
    # DependsOn: ConfigRecorder
    Properties:
      ConfigRuleName: !Sub "${ProjectName}-s3-no-public-read"
      Description: Checks that S3 buckets do not allow public read access (flags our intentional one)
      Source:
        Owner: AWS
        SourceIdentifier: S3_BUCKET_PUBLIC_READ_PROHIBITED

  # Rule: SSH not open to world
  SSHRestrictedRule:
    Type: AWS::Config::ConfigRule
    # DependsOn: ConfigRecorder
    Properties:
      ConfigRuleName: !Sub "${ProjectName}-ssh-restricted"
      Description: Checks that SSH is not open to 0.0.0.0/0 (flags our intentional config)
      Source:
        Owner: AWS
        SourceIdentifier: INCOMING_SSH_DISABLED

  # Rule: Root account MFA
  RootMFARule:
    Type: AWS::Config::ConfigRule
    # DependsOn: ConfigRecorder
    Properties:
      ConfigRuleName: !Sub "${ProjectName}-root-mfa-enabled"
      Description: Checks that root account has MFA enabled
      Source:
        Owner: AWS
        SourceIdentifier: ROOT_ACCOUNT_MFA_ENABLED

  # Rule: EKS logging enabled
  EKSLoggingRule:
    Type: AWS::Config::ConfigRule
    # DependsOn: ConfigRecorder
    Properties:
      ConfigRuleName: !Sub "${ProjectName}-eks-logging-enabled"
      Description: Checks EKS cluster has logging enabled
      Source:
        Owner: AWS
        SourceIdentifier: EKS_CLUSTER_LOGGING_ENABLED

  # Rule: CloudTrail enabled
  CloudTrailEnabledRule:
    Type: AWS::Config::ConfigRule
    # DependsOn: ConfigRecorder
    Properties:
      ConfigRuleName: !Sub "${ProjectName}-cloudtrail-enabled"
      Description: Checks CloudTrail is enabled in all regions
      Source:
        Owner: AWS
        SourceIdentifier: CLOUD_TRAIL_ENABLED

  # Rule: IAM no wildcard actions on policies
  IAMWildcardRule:
    Type: AWS::Config::ConfigRule
    # DependsOn: ConfigRecorder
    Properties:
      ConfigRuleName: !Sub "${ProjectName}-iam-no-inline-policy-check"
      Description: Checks for IAM inline policies with wildcard permissions
      Source:
        Owner: AWS
        SourceIdentifier: IAM_NO_INLINE_POLICY_CHECK

Outputs:
  # GuardDutyDetectorId:
  #   Value: !Ref GuardDutyDetector
  #   Export:
  #     Name: !Sub "${ProjectName}-GuardDutyDetectorId"
  SecurityAlertsTopicArn:
    Value: !Ref SecurityAlertsTopic
    Export:
      Name: !Sub "${ProjectName}-SecurityAlertsTopic"
  CloudTrailArn:
    Value: !GetAtt WizCloudTrail.Arn
    Export:
      Name: !Sub "${ProjectName}-CloudTrailArn"
