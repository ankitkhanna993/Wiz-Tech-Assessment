AWSTemplateFormatVersion: '2010-09-09'
Description: 'Wiz Exercise - Cloud Native Security Controls (CloudTrail, Config, GuardDuty, SCPs)'

Parameters:
  ProjectName:
    Type: String
    Default: wiz-exercise
  AlertEmail:
    Type: String
    Description: Email address for security alerts
    Default: ankitkhanna993@gmail.com

Resources:
  # -------------------------------------------------------
  # CloudTrail - Control Plane Audit Logging (REQUIRED)
  # -------------------------------------------------------
  CloudTrailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-cloudtrail-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90

  CloudTrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudTrailBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt CloudTrailBucket.Arn
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${CloudTrailBucket.Arn}/AWSLogs/${AWS::AccountId}/*"
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  CloudTrailLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/cloudtrail/${ProjectName}"
      RetentionInDays: 30

  CloudTrailRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudTrailCWLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt CloudTrailLogGroup.Arn

  # Main CloudTrail (control plane audit logging)
  WizCloudTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: CloudTrailBucketPolicy
    Properties:
      TrailName: !Sub "${ProjectName}-audit-trail"
      S3BucketName: !Ref CloudTrailBucket
      IsLogging: true
      IsMultiRegionTrail: false
      IncludeGlobalServiceEvents: true
      EnableLogFileValidation: true
      CloudWatchLogsLogGroupArn: !GetAtt CloudTrailLogGroup.Arn
      CloudWatchLogsRoleArn: !GetAtt CloudTrailRole.Arn
      EventSelectors:
        - ReadWriteType: All
          IncludeManagementEvents: true
          DataResources:
            - Type: AWS::S3::Object
              Values:
                - !Sub "arn:aws:s3:::${ProjectName}-mongodb-backups-${AWS::AccountId}/"

  # -------------------------------------------------------
  # GuardDuty - Detective Control (REQUIRED)
  # -------------------------------------------------------
  # GuardDutyDetector:
  #   Type: AWS::GuardDuty::Detector
  #   Properties:
  #     Enable: true
  #     FindingPublishingFrequency: SIX_HOURS
  #     DataSources:
  #       S3Logs:
  #         Enable: true
  #       Kubernetes:
  #         AuditLogs:
  #           Enable: true
  #       MalwareProtection:
  #         ScanEc2InstanceWithFindings:
  #           EbsVolumes: true

  # -------------------------------------------------------
  # SNS for Security Alerts
  # -------------------------------------------------------
  SecurityAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectName}-security-alerts"
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  # -------------------------------------------------------
  # EventBridge Rule - Alert on GuardDuty HIGH findings
  # -------------------------------------------------------
  GuardDutyHighFindingRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${ProjectName}-guardduty-high-findings"
      Description: Alert on GuardDuty HIGH and CRITICAL severity findings
      EventPattern:
        source:
          - aws.guardduty
        detail-type:
          - GuardDuty Finding
        detail:
          severity:
            - numeric:
              - ">="
              - 7
      State: ENABLED
      Targets:
        - Arn: !Ref SecurityAlertsTopic
          Id: SecurityAlertsSNS

  SecurityAlertsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SecurityAlertsTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SecurityAlertsTopic

