# ============================================================
# Pipeline 2: Container Build, Scan & Kubernetes Deploy
# Builds the Docker image, scans with Trivy, pushes to ECR,
# then triggers a rolling deployment on EKS
# ============================================================
name: Build and Deploy Application

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'k8s/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: wiz-exercise
  ECR_REPOSITORY: wiz-exercise-app

jobs:
  # -------------------------------------------------------
  # Container Image Build & Security Scan (Trivy)
  # -------------------------------------------------------
  build-and-scan:
    name: Build & Scan Container Image
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.build-image.outputs.image-uri }}
      image-tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          cd app
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image-uri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Security scan BEFORE pushing to registry
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build-image.outputs.image-uri }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'   # set to '1' to fail on CRITICAL/HIGH for hard enforcement

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Run Trivy for human-readable output
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build-image.outputs.image-uri }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      # Push AFTER scan
      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "Pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  # -------------------------------------------------------
  # Deploy to EKS
  # -------------------------------------------------------
  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.PROJECT_NAME }}-eks \
            --region ${{ env.AWS_REGION }}

      - name: Update image in deployment manifest
        env:
          ECR_REGISTRY: ${{ needs.build-and-scan.outputs.image-uri }}
          IMAGE_TAG: ${{ needs.build-and-scan.outputs.image-tag }}
        run: |
          # Get account ID for ECR URI
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"

          # Replace placeholder in manifest
          sed -i "s|<AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/wiz-exercise-app:latest|${ECR_URI}|g" \
            k8s/app-manifests.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/app-manifests.yaml

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/wiz-todo-app -n wiz-app --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n wiz-app
          kubectl get svc -n wiz-app
          kubectl get ingress -n wiz-app

      - name: Validate wizexercise.txt in running container
        run: |
          POD=$(kubectl get pods -n wiz-app -l app=wiz-todo-app \
            -o jsonpath='{.items[0].metadata.name}')
          echo "Checking wizexercise.txt in pod: $POD"
          kubectl exec -n wiz-app $POD -- cat /app/wizexercise.txt
