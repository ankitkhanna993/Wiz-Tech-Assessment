AWSTemplateFormatVersion: '2010-09-09'
Description: 'Wiz Exercise - EKS Cluster in Private Subnets'

Parameters:
  ProjectName:
    Type: String
    Default: wiz-exercise
  KubernetesVersion:
    Type: String
    Default: "1.29"

Outputs:
  EKSClusterName:
    Value: !Ref EKSCluster
    Export:
      Name: !Sub "${ProjectName}-EKSClusterName"
  EKSClusterEndpoint:
    Value: !GetAtt EKSCluster.Endpoint
    Export:
      Name: !Sub "${ProjectName}-EKSEndpoint"
  NodeGroupRoleArn:
    Value: !GetAtt NodeInstanceRole.Arn
    Export:
      Name: !Sub "${ProjectName}-NodeRoleArn"
  ECRRepositoryUri:
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}-app"
    Export:
      Name: !Sub "${ProjectName}-ECRUri"

Resources:
  # -------------------------------------------------------
  # ECR Repository for container image
  # -------------------------------------------------------
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${ProjectName}-app"
      ImageScanningConfiguration:
        ScanOnPush: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-ecr"

  # -------------------------------------------------------
  # EKS Cluster IAM Role
  # -------------------------------------------------------
  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-eks-cluster-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  # -------------------------------------------------------
  # EKS Node Group IAM Role
  # -------------------------------------------------------
  NodeInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-eks-node-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

  # -------------------------------------------------------
  # EKS Cluster Security Group
  # -------------------------------------------------------
  EKSClusterSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EKS Cluster Security Group
      VpcId: !ImportValue
        Fn::Sub: "${ProjectName}-VpcId"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-eks-cluster-sg"

  # -------------------------------------------------------
  # EKS Cluster
  # -------------------------------------------------------
  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub "${ProjectName}-eks"
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt EKSClusterRole.Arn
      ResourcesVpcConfig:
        SubnetIds:
          - !ImportValue
            Fn::Sub: "${ProjectName}-PrivateSubnet1Id"
          - !ImportValue
            Fn::Sub: "${ProjectName}-PrivateSubnet2Id"
          # Public subnets for load balancer
          - !ImportValue
            Fn::Sub: "${ProjectName}-PublicSubnet1Id"
          - !ImportValue
            Fn::Sub: "${ProjectName}-PublicSubnet2Id"
        SecurityGroupIds:
          - !Ref EKSClusterSG
        EndpointPublicAccess: true
        EndpointPrivateAccess: true
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
            - Type: authenticator
            - Type: controllerManager
            - Type: scheduler

  # -------------------------------------------------------
  # EKS Node Group (in private subnets)
  # -------------------------------------------------------
  EKSNodeGroup:
    Type: AWS::EKS::Nodegroup
    DependsOn: EKSCluster
    Properties:
      ClusterName: !Ref EKSCluster
      NodegroupName: !Sub "${ProjectName}-node-group"
      NodeRole: !GetAtt NodeInstanceRole.Arn
      Subnets:
        - !ImportValue
          Fn::Sub: "${ProjectName}-PrivateSubnet1Id"
        - !ImportValue
          Fn::Sub: "${ProjectName}-PrivateSubnet2Id"
      ScalingConfig:
        MinSize: 2
        MaxSize: 3
        DesiredSize: 2
      InstanceTypes:
        - t3.medium
      AmiType: AL2_x86_64
      Tags:
        Name: !Sub "${ProjectName}-nodes"
